version: '3.8'

services:
  # -----------------------------------------------------------------
  # 1. Redis 缓存
  # -----------------------------------------------------------------
  redis:
    image: redis:7.0-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    networks:
      - ecommerce-network

  # -----------------------------------------------------------------
  # 2. ChromaDB 向量数据库
  # -----------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: ecommerce-chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # 确保本地有 ./data/chroma 这个目录，或者让 Docker 自动创建
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - ecommerce-network

  # -----------------------------------------------------------------
  # 3. MySQL 数据库
  # -----------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3306:3306"
    volumes:
      # 数据持久化
      - ./data/mysql:/var/lib/mysql
      # 初始化脚本 (建表语句放在这里)
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - ecommerce-network

  # -----------------------------------------------------------------
  # 4. Kafka (KRaft模式，无Zookeeper)
  # -----------------------------------------------------------------
  kafka:
    image: bitnamilegacy/kafka:3.5
    container_name: local-kafka
    restart: always
    ports:
      - "9092:9092"
    volumes:
      - ./data/kafka:/bitnami/kafka
    environment:
      # KRaft 核心配置
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # 监听器配置
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      # 注意：这里配置为 localhost，意味着你的 Java/Python 代码必须运行在宿主机上
      # 如果以后你的代码跑在 Docker 里，这里的 localhost 会导致连接失败
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
      # 消息保留策略 (你的自定义配置)
      - KAFKA_CFG_LOG_RETENTION_HOURS=1
      - KAFKA_CFG_LOG_RETENTION_BYTES=1073741824
      - KAFKA_CFG_LOG_RETENTION_CHECK_INTERVAL_MS=300000
    networks:
      - ecommerce-network

# -----------------------------------------------------------------
# 网络定义
# -----------------------------------------------------------------
networks:
  ecommerce-network:
    driver: bridge